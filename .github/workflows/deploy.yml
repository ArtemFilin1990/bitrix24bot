name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - 'inbox/**'
  workflow_dispatch:
    inputs:
      cf_token:
        description: 'Cloudflare API Token (overrides secret)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify wrangler.toml configuration
        run: |
          echo "Checking wrangler.toml exists..."
          ls -la wrangler.toml
          echo "Main entry point:"
          grep "^main" wrangler.toml
          echo "Verifying worker.js exists:"
          ls -la b24-imbot/worker.js

      - name: Install Wrangler
        run: npm install -g wrangler@4.76.0

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cf_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
