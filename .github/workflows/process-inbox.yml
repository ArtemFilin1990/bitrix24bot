name: Process inbox → D1

on:
  push:
    branches: [main]
    paths:
      - 'inbox/**'

jobs:
  process-inbox:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count processable files
        id: check
        run: |
          count=$(find inbox/ -type f \( -name "*.md" -o -name "*.csv" \) 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count file(s) to process"

      - name: Set up Python
        if: steps.check.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SQL from inbox files
        if: steps.check.outputs.count != '0'
        run: |
          python scripts/process_inbox.py --inbox inbox --output /tmp/inbox.sql
          echo "SQL lines: $(wc -l < /tmp/inbox.sql)"

      - name: Install Wrangler
        if: steps.check.outputs.count != '0'
        run: npm install -g wrangler@4.76.0

      - name: Apply SQL to D1
        if: steps.check.outputs.count != '0'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute bearings-catalog --file /tmp/inbox.sql --remote

      - name: Delete processed files and commit
        if: steps.check.outputs.count != '0'
        run: |
          find inbox/ -type f \( -name "*.md" -o -name "*.csv" \) -delete
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A inbox/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: delete processed inbox files [skip ci]"
            git push origin main
          fi
