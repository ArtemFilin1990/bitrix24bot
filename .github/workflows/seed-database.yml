name: Seed Database

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/seed-database.yml'
  workflow_dispatch:
    inputs:
      cf_token:
        description: 'Cloudflare API Token (overrides secret)'
        required: false
      apply_schema:
        description: 'Apply schema.sql'
        required: false
        default: 'true'
      seed_bearings:
        description: 'Seed bearings/catalog/analogs/brands'
        required: false
        default: 'true'
      seed_kb:
        description: 'Seed knowledge base'
        required: false
        default: 'true'
      register_bot:
        description: 'Register bot with Bitrix24'
        required: false
        default: 'true'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wrangler
        run: npm install -g wrangler@4.76.0

      - name: Apply schema
        if: ${{ github.event_name == 'push' || github.event.inputs.apply_schema == 'true' }}
        run: wrangler d1 execute bearings-catalog --file schema.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cf_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Clone BearingsInfo
        if: ${{ github.event_name == 'push' || github.event.inputs.seed_bearings == 'true' }}
        run: git clone --depth=1 https://github.com/ArtemFilin1990/BearingsInfo.git /tmp/BearingsInfo

      - name: Generate & apply bearings seed
        if: ${{ github.event_name == 'push' || github.event.inputs.seed_bearings == 'true' }}
        run: |
          SNAPSHOT=$(git -C /tmp/BearingsInfo rev-parse HEAD)
          python scripts/build_bearings_seed.py \
            --source-dir /tmp/BearingsInfo \
            --output /tmp/bearings.seed.sql \
            --source-repo ArtemFilin1990/BearingsInfo \
            --source-snapshot "$SNAPSHOT"
          wrangler d1 execute bearings-catalog --file /tmp/bearings.seed.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cf_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Clone knowledge-base
        if: ${{ github.event_name == 'push' || github.event.inputs.seed_kb == 'true' }}
        run: git clone --depth=1 https://github.com/ArtemFilin1990/knowledge-base.git /tmp/knowledge-base

      - name: Generate & apply KB seed
        if: ${{ github.event_name == 'push' || github.event.inputs.seed_kb == 'true' }}
        run: |
          SNAPSHOT=$(git -C /tmp/knowledge-base rev-parse HEAD)
          python scripts/build_kb_seed.py \
            --source-dir /tmp/knowledge-base \
            --output /tmp/kb.seed.sql \
            --source-repo ArtemFilin1990/knowledge-base \
            --source-snapshot "$SNAPSHOT"
          wrangler d1 execute bearings-catalog --file /tmp/kb.seed.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cf_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Register bot with Bitrix24
        if: ${{ github.event_name == 'push' || github.event.inputs.register_bot == 'true' }}
        run: |
          SUBDOMAIN=$(curl -sf \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['subdomain'])")
          WORKER_URL="https://bitrix24bot.${SUBDOMAIN}.workers.dev"
          echo "Registering bot at ${WORKER_URL}/register"
          RESULT=$(curl -sf "${WORKER_URL}/register?secret=${IMPORT_SECRET}" || echo '{"error":"curl failed"}')
          echo "Result: $RESULT"
          echo "$RESULT" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d.get('ok'):
    print('Bot registered! BOT_ID =', d.get('bot_id'))
elif 'error' in d:
    print('Error:', d['error'])
    exit(1)
"
        env:
          CLOUDFLARE_API_TOKEN: ${{ github.event.inputs.cf_token || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          IMPORT_SECRET: ${{ secrets.IMPORT_SECRET }}
