# Продакшн-конфиг для деплоя через GitHub Actions или `wrangler deploy` из корня репо
# Перед деплоем установи секреты через `wrangler secret put <NAME>`:
#   GEMINI_API_KEY, B24_PORTAL, B24_USER_ID, B24_TOKEN,
#   WORKER_HOST, IMPORT_SECRET, B24_APP_TOKEN (optional)
name = "bitrix24bot"
main = "b24-imbot/worker.js"
compatibility_date = "2024-01-01"

[vars]
# ВАЖНО: BOT_ID и CLIENT_ID можно держать в [vars], т.к. они не являются секретами
# BOT_ID получается после вызова GET /register, CLIENT_ID — при регистрации приложения
BOT_ID    = "1267"
CLIENT_ID = "tbbsrb7w6k7vvnzegup7z4w7dmgvbqkf"

[[kv_namespaces]]
binding = "CHAT_HISTORY"
id = "f7257a53733146b6926eb20321ab4896"

[[d1_databases]]
binding = "CATALOG"
database_name = "bearings-catalog"
database_id = "0b5b8131-d96b-4478-a63e-edc7c787b654"
migrations_dir = "migrations"
